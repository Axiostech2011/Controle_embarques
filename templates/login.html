<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login - Controle de Embarques</title>

    <link rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}">

</head>

<body class="login-body">

    <div class="login-container">

        <div class="login-card">

            <img src="{{ url_for('static', filename='logo.png') }}"
                alt="Logo"
                class="logo-login">

            <h1>Controle de Embarques</h1>

            <p class="subtitulo">
                Sistema de acompanhamento logístico
            </p>

            {% with messages = get_flashed_messages() %}
            {% if messages %}

            <div class="erro-login">
                {{ messages[0] }}
            </div>

            {% endif %}
            {% endwith %}

            <form method="POST">

                <div class="form-group">

                    <label>Usuário</label>

                    <input
                        type="text"
                        name="usuario"
                        required>

                </div>

                <div class="form-group">

                    <label>Senha</label>

                    <input
                        type="password"
                        name="senha"
                        required>

                </div>

                <button
                    type="submit"
                    class="btn-login">

                    Entrar

                </button>

            </form>

            <div class="info-acesso">

                <h3>Acessos</h3>

                <p>
                    <strong>Administrador:</strong>
                    
                </p>

                <p>
                    <strong>Cliente:</strong>
                 
                </p>

            </div>

        </div>

    </div>

</body>

</html>
