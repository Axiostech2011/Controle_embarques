<!DOCTYPE html>
<html lang="pt-BR">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Editar Embarque</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">

<script>

function atualizarDataHora(){

    const agora = new Date();

    document.getElementById("hora").innerHTML =
        agora.toLocaleTimeString('pt-BR');

    document.getElementById("data").innerHTML =
        agora.toLocaleDateString('pt-BR');

}

setInterval(atualizarDataHora,1000);

</script>

</head>

<body onload="atualizarDataHora()">

<header>

<div class="hora">
<span id="hora"></span>
</div>

<div class="titulo">
EDITAR EMBARQUE
</div>

<div class="data">
<span id="data"></span>
</div>

</header>

<div class="container">

<div class="card">

<div style="text-align:center;margin-bottom:20px;">

<img
src="{{ url_for('static', filename='logo.png') }}"
alt="Logo"
style="max-height:100px;">

</div>

<h2 style="margin-bottom:20px;">
Editar Embarque
</h2>

<form method="POST">

<div class="form-grid">

<div class="form-group">
<label>ETD</label>
<input type="date" name="etd" value="{{ embarque['etd'] }}" required>
</div>

<div class="form-group">
<label>ETA</label>
<input type="date" name="eta" value="{{ embarque['eta'] }}" required>
</div>

<div class="form-group">
<label>Exportador</label>
<input type="text" name="exportador" value="{{ embarque['exportador'] }}" required>
</div>

<div class="form-group">
<label>Produto</label>
<input type="text" name="produto" value="{{ embarque['produto'] }}" required>
</div>

<div class="form-group">
<label>Navio</label>
<input type="text" name="navio" value="{{ embarque['navio'] }}" required>
</div>

<div class="form-group">
<label>CIA Marítima</label>
<input type="text" name="cia_maritima" value="{{ embarque['cia_maritima'] }}" required>
</div>

<div class="form-group">
<label>REF</label>
<input type="text" name="ref" value="{{ embarque['ref'] }}" required>
</div>

<div class="form-group">
<label>Fatura</label>
<input type="text" name="fatura" value="{{ embarque['fatura'] }}" required>
</div>

<div class="form-group">
<label>Porto</label>
<input type="text" name="porto" value="{{ embarque['porto'] }}" required>
</div>

<div class="form-group">
<label>Containers</label>
<input type="number" name="container" value="{{ embarque['container'] }}" required>
</div>

</div>

<br>

<button class="btn" type="submit">
Salvar Alterações
</button>

</form>

<br>

<div class="menu">

<a href="/todos_embarques" class="btn">
Embarques Ativos
</a>

<a href="/historico" class="btn">
Histórico
</a>

<a href="/logout" class="btn">
Sair
</a>

</div>

</div>

</div>

</body>

</html>
